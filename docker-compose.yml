name: apache-hop-etl

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    profiles:
      - local-db
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init-db:
    image: python:3.9-slim
    profiles:
      - local-db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./sql:/app/sql
      - ./ETL:/app/ETL
    working_dir: /app
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      bash -c "pip install psycopg2-binary &&
               python ETL/init_db.py &&
               python ETL/load_clean_missing_to_postgres.py --host postgres --user $$PGUSER --password $$PGPASSWORD --database $$PGDATABASE --csv-dir ./data/processed/clean_missing --schema-file ./sql/Staging/staging_schema.sql --recreate"

  hop-web:
    image: apache/hop-web:${HOP_VERSION}
    ports:
      - "${HOP_WEB_PORT}:8080"
    environment:
      HOP_PROJECT_NAME: ${HOP_PROJECT_NAME}
      HOP_PROJECT_FOLDER: /files/projects/${HOP_PROJECT_NAME}
      HOP_CONFIG_FOLDER: /files/config
      HOP_LOG_LEVEL: ${HOP_LOG_LEVEL}
      HOP_OPTIONS: ${HOP_OPTIONS}
      HOP_SHARED_JDBC_FOLDERS: /files/jdbc
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_STAGING_DB: ${POSTGRES_STAGING_DB}
      POSTGRES_DWH_DB: ${POSTGRES_DWH_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL}
      POSTGRES_STAGING_JDBC_URL: ${POSTGRES_STAGING_JDBC_URL}
      POSTGRES_DWH_JDBC_URL: ${POSTGRES_DWH_JDBC_URL}
    volumes:
      - ./ETL/hop:/files
    restart: unless-stopped

  hop-server:
    image: apache/hop:${HOP_VERSION}
    profiles:
      - server
    ports:
      - "${HOP_SERVER_HTTP_PORT}:8181"
      - "${HOP_SERVER_SHUTDOWN_PORT}:8079"
    environment:
      HOP_SERVER_HOSTNAME: 0.0.0.0
      HOP_SERVER_PORT: 8181
      HOP_SERVER_SHUTDOWNPORT: 8079
      HOP_SERVER_USER: ${HOP_SERVER_USER}
      HOP_SERVER_PASS: ${HOP_SERVER_PASS}
      HOP_PROJECT_NAME: ${HOP_PROJECT_NAME}
      HOP_PROJECT_FOLDER: /files/projects/${HOP_PROJECT_NAME}
      HOP_CONFIG_FOLDER: /files/config
      HOP_LOG_LEVEL: ${HOP_LOG_LEVEL}
      HOP_OPTIONS: ${HOP_OPTIONS}
      HOP_SERVER_METADATA_FOLDER: /files/metadata
      HOP_SHARED_JDBC_FOLDERS: /files/jdbc
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_STAGING_DB: ${POSTGRES_STAGING_DB}
      POSTGRES_DWH_DB: ${POSTGRES_DWH_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_JDBC_URL: ${POSTGRES_JDBC_URL}
      POSTGRES_STAGING_JDBC_URL: ${POSTGRES_STAGING_JDBC_URL}
      POSTGRES_DWH_JDBC_URL: ${POSTGRES_DWH_JDBC_URL}
    volumes:
      - ./ETL/hop:/files
    restart: unless-stopped

volumes:
  postgres_data:
